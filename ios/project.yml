name: VMflow
options:
  bundleIdPrefix: com.vmflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

configFiles:
  Debug: Configurations/Debug.xcconfig
  Release: Configurations/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: false
    INFOPLIST_FILE: VMflow/Resources/Info.plist

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  VMflow:
    type: application
    platform: iOS
    sources:
      - VMflow
    settings:
      base:
        INFOPLIST_FILE: VMflow/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: VMflow/Resources/VMflow.entitlements
        DEVELOPMENT_TEAM: 4JT3V7XVXM
    preBuildScripts:
      - name: Auto-increment build number from git
        script: |
          BUILD_NUM=$(git -C "${SRCROOT}/.." rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
        runOnlyWhenInstalling: false
        basedOnDependencyAnalysis: false
    dependencies:
      - package: Supabase
        product: Supabase
