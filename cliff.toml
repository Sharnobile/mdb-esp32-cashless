[changelog]
header = """
# Firmware Changelog\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/lucienkerl/mdb-esp32-cashless
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}\
  {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif -%}
  {% if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}){%- endif %}
{%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^Merge", skip = true },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs", group = "Documentation" },
    { message = "^chore", group = "Chores" },
    { message = "^ci", skip = true },
    { message = "^test", skip = true },
    # Catch-all for non-conventional commits
    { message = ".*", group = "Other Changes" },
]
filter_commits = false
tag_pattern = "slave-v[0-9].*"
sort_commits = "newest"

# Only include commits touching the firmware directory
commit_preprocessors = []

[remote.github]
owner = "lucienkerl"
repo = "mdb-esp32-cashless"
