openapi: '3.0.3'
info:
  title: VMflow API
  version: '1.0'
  description: |
    Public REST API for VMflow vending machine management.

    ## Authentication
    All endpoints (except `/api/v1/docs`) require an API key via the `X-API-Key` header.
    Create API keys in the management dashboard under **Settings > API Keys**.

    ## Query Syntax (PostgREST)
    CRUD endpoints support PostgREST query parameters:

    | Operator | Example | Description |
    |----------|---------|-------------|
    | `eq` | `?status=eq.online` | Equals |
    | `neq` | `?status=neq.offline` | Not equals |
    | `gt` / `gte` | `?created_at=gte.2026-01-01` | Greater than (or equal) |
    | `lt` / `lte` | `?item_price=lt.5` | Less than (or equal) |
    | `like` | `?name=like.*cola*` | Pattern match (case-sensitive) |
    | `ilike` | `?name=ilike.*cola*` | Pattern match (case-insensitive) |
    | `in` | `?status=in.(online,offline)` | In list |
    | `is` | `?revoked_at=is.null` | IS NULL / IS NOT NULL |

    **Ordering:** `?order=created_at.desc`
    **Pagination:** `?limit=20&offset=40`
    **Column selection:** `?select=id,name,price`

    ## Rate Limiting
    Default: 100 requests per minute per API key. When exceeded, the API returns
    `429 Too Many Requests` with a `retry_after` field (seconds).

servers:
  - url: '{baseUrl}/api/v1'
    variables:
      baseUrl:
        default: 'http://localhost:8000'
        description: Your VMflow server URL

security:
  - ApiKeyAuth: []

paths:
  /machines:
    get:
      summary: List machines
      tags: [Machines]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
        - $ref: '#/components/parameters/select'
      responses:
        '200':
          description: Array of machines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Machine'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      summary: Create a machine
      tags: [Machines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MachineCreate'
      responses:
        '201':
          description: Created
        '401':
          $ref: '#/components/responses/Unauthorized'

  /machines/{id}:
    get:
      summary: Get a single machine
      tags: [Machines]
      parameters:
        - $ref: '#/components/parameters/resourceId'
      responses:
        '200':
          description: Machine object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Machine'
        '404':
          $ref: '#/components/responses/NotFound'

  /sales:
    get:
      summary: List sales (read-only)
      tags: [Sales]
      description: Sales records are read-only. They are created automatically when a vending machine reports a sale via MQTT.
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
        - $ref: '#/components/parameters/select'
      responses:
        '200':
          description: Array of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sale'

  /products:
    get:
      summary: List products
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
        - $ref: '#/components/parameters/select'
      responses:
        '200':
          description: Array of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create a product
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Created

  /categories:
    get:
      summary: List product categories
      tags: [Products]
      responses:
        '200':
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /devices:
    get:
      summary: List devices (read-only)
      tags: [Devices]
      description: |
        Returns registered embedded devices. Sensitive fields (passkey, MQTT credentials)
        are hidden. Devices are read-only via the API — they are provisioned via the
        management dashboard.
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Array of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'

  /trays:
    get:
      summary: List machine trays/slots
      tags: [Trays]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Array of trays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tray'
    post:
      summary: Create a tray
      tags: [Trays]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrayCreate'
      responses:
        '201':
          description: Created

  /warehouses:
    get:
      summary: List warehouses
      tags: [Warehouse]
      responses:
        '200':
          description: Array of warehouses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Warehouse'

  /stock-batches:
    get:
      summary: List stock batches (FIFO)
      tags: [Warehouse]
      responses:
        '200':
          description: Array of stock batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockBatch'

  /paxcounter:
    get:
      summary: List paxcounter data (read-only)
      tags: [Analytics]
      description: Visitor traffic counts from ESP32 paxcounter sensors.
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
      responses:
        '200':
          description: Array of paxcounter entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaxCounter'

  /activity-log:
    get:
      summary: List activity log (read-only)
      tags: [Analytics]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
      responses:
        '200':
          description: Array of activity log entries

  /suppliers:
    get:
      summary: List suppliers
      tags: [Purchase Prices]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
        - $ref: '#/components/parameters/select'
      responses:
        '200':
          description: Array of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Supplier'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /purchase-prices:
    get:
      summary: List purchase prices (Einkaufspreise)
      tags: [Purchase Prices]
      description: |
        Recorded supplier purchase prices per product (net + gross). Filter to one
        product with `?product_id=eq.<uuid>`. Read-only here — use the
        `add-purchase-price` / `update-purchase-price` actions to write, so net/gross
        and the supplier are resolved correctly.
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
        - $ref: '#/components/parameters/select'
      responses:
        '200':
          description: Array of purchase prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PurchasePrice'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /purchase-prices/{id}:
    delete:
      summary: Delete a purchase price
      tags: [Purchase Prices]
      parameters:
        - $ref: '#/components/parameters/resourceId'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /barcodes:
    get:
      summary: List product barcodes
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/select'
      responses:
        '200':
          description: Array of barcodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Barcode'

  /min-stock:
    get:
      summary: List per-warehouse minimum stock levels
      tags: [Warehouse]
      responses:
        '200':
          description: Array of min-stock rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MinStock'

  /warehouse-transactions:
    get:
      summary: List warehouse stock movements (read-only)
      tags: [Warehouse]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
      responses:
        '200':
          description: Array of warehouse transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WarehouseTransaction'

  /warehouse-positions:
    get:
      summary: List warehouse product positions (layout)
      tags: [Warehouse]
      responses:
        '200':
          description: Array of positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WarehousePosition'

  /tax-classes:
    get:
      summary: List tax classes
      tags: [Tax]
      responses:
        '200':
          description: Array of tax classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaxClass'

  /tax-rates:
    get:
      summary: List tax rates
      tags: [Tax]
      responses:
        '200':
          description: Array of tax rates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaxRate'

  /firmware:
    get:
      summary: List firmware versions (read-only)
      tags: [Devices]
      description: Use a firmware `id` from here as `firmware_id` for the trigger-ota action.
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/order'
      responses:
        '200':
          description: Array of firmware versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FirmwareVersion'

  /deals:
    get:
      summary: List matched deals (Marktguru offers cached per company)
      tags: [Deals]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }, { $ref: '#/components/parameters/select' }]
      responses:
        '200': { description: Array of deals, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /deal-keywords:
    get:
      summary: List deal keyword groups
      tags: [Deals]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }]
      responses:
        '200': { description: Array of keyword groups, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /deal-keyword-products:
    get:
      summary: List keyword-group ↔ product links
      tags: [Deals]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }]
      responses:
        '200': { description: Array of links, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /cash-books:
    get:
      summary: List cash books (per machine)
      tags: [Cashbook]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }]
      responses:
        '200': { description: Array of cash books, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /cash-book-entries:
    get:
      summary: List cash book entries
      tags: [Cashbook]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of entries, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /payments:
    get:
      summary: List payments
      tags: [Cashbook]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of payments, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /suppressed-sales:
    get:
      summary: List suppressed (deduplicated) sales (read-only)
      tags: [Sales]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of suppressed sales, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /stock-decrement-log:
    get:
      summary: List stock-decrement audit log (read-only)
      tags: [Analytics]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of log entries, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /mdb-log:
    get:
      summary: List MDB state-change diagnostics (read-only)
      tags: [Diagnostics]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of MDB log entries, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /dex-snapshots:
    get:
      summary: List DEX telemetry snapshots (read-only)
      tags: [Diagnostics]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of DEX snapshots, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /device-restarts:
    get:
      summary: List device restart events (read-only)
      tags: [Diagnostics]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of restart events, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /ota-updates:
    get:
      summary: List OTA update events (read-only)
      tags: [Diagnostics]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of OTA update events, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /product-offerings:
    get:
      summary: List per-machine product offering history
      tags: [Analytics]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }]
      responses:
        '200': { description: Array of offerings, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /machine-feedback:
    get:
      summary: List machine feedback
      tags: [Analytics]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }]
      responses:
        '200': { description: Array of feedback, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /product-wishes:
    get:
      summary: List product wishes
      tags: [Analytics]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }]
      responses:
        '200': { description: Array of product wishes, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /restock-subscriptions:
    get:
      summary: List restock subscriptions
      tags: [Warehouse]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }]
      responses:
        '200': { description: Array of subscriptions, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /refill-applications:
    get:
      summary: List refill-tour tray applications
      tags: [Warehouse]
      parameters: [{ $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/offset' }, { $ref: '#/components/parameters/order' }]
      responses:
        '200': { description: Array of refill applications, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /warehouse-position-groups:
    get:
      summary: List warehouse position groups
      tags: [Warehouse]
      responses:
        '200': { description: Array of position groups, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /system-tax-rates:
    get:
      summary: List system reference tax rates (global EU reference data)
      tags: [Tax]
      responses:
        '200': { description: Array of reference rates, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Row' } } } } }

  /actions/send-credit:
    post:
      summary: Send credit to a device
      tags: [Actions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id, amount]
              properties:
                device_id:
                  type: string
                  format: uuid
                amount:
                  type: number
                  description: Credit amount in EUR
                  example: 1.50
      responses:
        '200':
          description: Credit sent
        '404':
          $ref: '#/components/responses/NotFound'

  /actions/trigger-ota:
    post:
      summary: Trigger OTA firmware update
      tags: [Actions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id, firmware_id]
              properties:
                device_id:
                  type: string
                  format: uuid
                firmware_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: OTA triggered

  /actions/send-config:
    post:
      summary: Send device configuration
      tags: [Actions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id, config]
              properties:
                device_id:
                  type: string
                  format: uuid
                config:
                  type: object
                  properties:
                    restart:
                      type: boolean
                      description: Remote restart the device
                    mdb_address:
                      type: integer
                      enum: [1, 2]
                      description: MDB address (1 or 2)
                    mdb_reset:
                      type: boolean
                      description: Soft MDB reset
      responses:
        '200':
          description: Config sent

  /actions/add-purchase-price:
    post:
      summary: Add a purchase price
      tags: [Purchase Prices]
      description: |
        Record a supplier purchase price for a product. The supplier is matched by
        name (case-insensitive) or created if new. Net and gross are computed from
        the entered value and the product's tax rate; pass `tax_rate_override`
        (decimal, e.g. 0.19) only when the product has no resolvable tax rate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, supplier_name, price, basis]
              properties:
                product_id:
                  type: string
                  format: uuid
                supplier_name:
                  type: string
                  example: Großhandel Müller
                price:
                  type: number
                  description: Unit price in the chosen basis (EUR)
                  example: 0.50
                basis:
                  type: string
                  enum: [net, gross]
                observed_on:
                  type: string
                  format: date
                  description: Invoice/offer date (defaults to today)
                note:
                  type: string
                tax_rate_override:
                  type: number
                  description: Decimal rate (e.g. 0.19) if the product has no tax class
      responses:
        '200':
          description: The created purchase price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchasePrice'
        '400':
          description: Validation error (e.g. unknown product or missing tax rate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /actions/update-purchase-price:
    post:
      summary: Update a purchase price
      tags: [Purchase Prices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, supplier_name, price, basis, observed_on]
              properties:
                id:
                  type: string
                  format: uuid
                supplier_name:
                  type: string
                price:
                  type: number
                basis:
                  type: string
                  enum: [net, gross]
                observed_on:
                  type: string
                  format: date
                note:
                  type: string
                tax_rate_override:
                  type: number
      responses:
        '200':
          description: The updated purchase price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchasePrice'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key created in the management dashboard

  parameters:
    resourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
      description: Max rows to return
    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
      description: Number of rows to skip
    order:
      name: order
      in: query
      schema:
        type: string
      description: 'Sort order, e.g. `created_at.desc`'
    select:
      name: select
      in: query
      schema:
        type: string
      description: 'Comma-separated column list, e.g. `id,name,price`'

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  retry_after:
                    type: integer
                    description: Seconds until next request is allowed

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    Row:
      type: object
      additionalProperties: true
      description: >
        A generic row from the underlying table (PostgREST columns passed through).
        Use `?select=` to pick columns. Detailed per-resource schemas can be added
        later if needed.

    Machine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company:
          type: string
          format: uuid
        name:
          type: string
        location:
          type: string
        created_at:
          type: string
          format: date-time

