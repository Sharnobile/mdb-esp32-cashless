# TCP listener (devices, forwarder)
listener 1883

# WebSocket listener (edge functions — edge runtime blocks raw TCP)
listener 9001
protocol websockets

# Persistence: queue QoS 1+ messages for offline clients with long-term
# retention so mid-duration Supabase/forwarder outages do not cause sales
# to drop off the broker before the device/forwarder can replay them.
#
# - 50k queued messages per client: with ~500 sales/device/day this buffers
#   ~100 days for a single device backlog, or 500 devices for 1 day.
# - 7d session expiry: covers weekend + holiday outages without losing
#   the forwarder's persistent session.
# - 100 inflight: matches the drain-window the forwarder can cope with.
persistence true
persistence_location /mosquitto/data
max_queued_messages 50000
max_inflight_messages 100
persistent_client_expiration 7d

# Authentication & Authorization
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl
