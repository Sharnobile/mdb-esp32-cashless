name: Build Firmware

on:
  push:
    tags:
      - 'slave-v*'
      - 'master-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.1
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine project from tag
        id: project
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == slave-v* ]]; then
            echo "dir=mdb-slave-esp32s3" >> "$GITHUB_OUTPUT"
            echo "name=mdb-slave-esp32s3" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#slave-}" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == master-v* ]]; then
            echo "dir=mdb-master-esp32s3" >> "$GITHUB_OUTPUT"
            echo "name=mdb-master-esp32s3" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#master-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build firmware
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          . $IDF_PATH/export.sh
          idf.py -DPROJECT_VER="${{ steps.project.outputs.version }}" build

      - name: Rename build artifact
        run: |
          cp "${{ steps.project.outputs.dir }}/build/${{ steps.project.outputs.name }}.bin" \
             "${{ steps.project.outputs.name }}-${{ steps.project.outputs.version }}.bin"

      - name: Rename bootloader artifact
        run: |
          cp "${{ steps.project.outputs.dir }}/build/bootloader/bootloader.bin" \
             "${{ steps.project.outputs.name }}-${{ steps.project.outputs.version }}-bootloader.bin"

      - name: Rename partition table artifact
        run: |
          cp "${{ steps.project.outputs.dir }}/build/partition_table/partition-table.bin" \
             "${{ steps.project.outputs.name }}-${{ steps.project.outputs.version }}-partitions.bin"

      - name: Determine cliff config
        id: cliff
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == slave-v* ]]; then
            echo "config=cliff.toml" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == master-v* ]]; then
            echo "config=cliff-master.toml" >> "$GITHUB_OUTPUT"
          fi

      - name: Install jq
        run: apt-get update -qq && apt-get install -y -qq jq > /dev/null

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: ${{ steps.cliff.outputs.config }}
          args: --latest --include-path "${{ steps.project.outputs.dir }}/**" --strip header

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.project.outputs.name }} ${{ steps.project.outputs.version }}"
          body: |
            ${{ steps.changelog.outputs.content }}

            ---
            Built with ESP-IDF v5.5.1 targeting ESP32-S3.
          files: |
            ${{ steps.project.outputs.name }}-${{ steps.project.outputs.version }}.bin
            ${{ steps.project.outputs.name }}-${{ steps.project.outputs.version }}-bootloader.bin
            ${{ steps.project.outputs.name }}-${{ steps.project.outputs.version }}-partitions.bin
          draft: false
          prerelease: false
