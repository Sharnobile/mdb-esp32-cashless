name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Unsigned IPA
        run: |
          cd ios
          # Build the project without signing
          xcodebuild -project VMflow.xcodeproj \
            -scheme VMflow \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package IPA
        run: |
          mkdir -p ios/Payload
          cp -r ios/build/Build/Products/Release-iphoneos/VMflow.app ios/Payload/
          cd ios
          zip -r VMflow.ipa Payload

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMflow-Unsigned-IPA
          path: ios/VMflow.ipa
