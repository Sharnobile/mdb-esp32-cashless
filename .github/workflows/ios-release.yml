name: iOS Release

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "fastlane lane"
        required: true
        type: choice
        options: [beta, metadata, release, screenshots]
        default: beta

jobs:
  fastlane:
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v5
        with:
          # Build number = git rev-list --count HEAD (both prebuild scripts).
          # A shallow clone yields 1 and App Store Connect rejects any build
          # number at or below the last upload.
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios

      - name: Select Xcode 26
        # Apple requires the iOS 26 SDK (Xcode 26+) for every App Store upload;
        # a 18.x-SDK build is rejected at validation ("must be built with the
        # iOS 26 SDK or later"). Pick the highest Xcode 26.x present rather than
        # a fixed patch, so an image update can't silently break this.
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 26 found on this runner"; ls -d /Applications/Xcode_*.app; exit 1
          fi
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Run fastlane lane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          # Only consulted by the `screenshots` lane's Snapfile. This
          # runner's Xcode 16.4 image has "iPhone 16 Pro Max" but not
          # "iPhone 17 Pro Max" — both are the same 6.9-inch (1320x2868)
          # class, so either produces the correct App Store asset size.
          SNAPSHOT_DEVICE: "iPhone 16 Pro Max"
        run: bundle exec fastlane ${{ github.event.inputs.lane }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: fastlane-logs
          path: |
            ios/fastlane/report.xml
            ~/Library/Logs/gym
          if-no-files-found: ignore
